server {
    listen 80;
    server_name localhost;
    root /var/www/backend/public;
    index index.php index.html;

    client_max_body_size 20M;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'" always;

    # Prefer edge-forwarded proto when present (set by host nginx / frontend proxy)
    set $fwd_proto $scheme;
    if ($http_x_forwarded_proto ~* "^https?$") {
        set $fwd_proto $http_x_forwarded_proto;
    }

    location ^~ /storage/ {
        location ~* \.(php|phtml|phar|svg)$ {
            deny all;
        }
        try_files $uri =404;
    }

    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /api/documentation {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /api/docs {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /api/docs.json {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /docs {
        return 302 /api/documentation;
    }

    location /up {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /api/health {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # HTTPS / URL generation behind TLS terminator (do not invent from client body)
        fastcgi_param HTTP_X_FORWARDED_PROTO $fwd_proto;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 120s;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
