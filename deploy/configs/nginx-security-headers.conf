# Shared security headers for Email Server (host Nginx + Docker Nginx)
# Include from a server { } block:
#   include /etc/nginx/snippets/email-server-security-headers.conf;
#
# Safe for JSON API + Vue admin SPA (Google Fonts allowed).

# Hide Nginx version in error pages / Server header
server_tokens off;

# Do not advertise the upstream app stack
proxy_hide_header X-Powered-By;
proxy_hide_header X-AspNet-Version;
proxy_hide_header X-AspNetMvc-Version;
fastcgi_hide_header X-Powered-By;

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "0" always;
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
# Modest CSP — does not block Vue/Vuetify ('unsafe-inline' styles) or Google Fonts
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; upgrade-insecure-requests" always;
