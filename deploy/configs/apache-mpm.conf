# Apache MPM event — supports 400 concurrent workers (1000+ keep-alive requests)
# Source: https://github.com/agabaandre/PHP_laravel_Codeigniter_wordpress_server_optimisation_enterprise

<IfModule mpm_event_module>
    ServerLimit              16
    MaxRequestWorkers        400
    ThreadsPerChild          25
    MaxConnectionsPerChild   10000

    StartServers             4
    MinSpareThreads          75
    MaxSpareThreads          250
    ThreadLimit              64

    KeepAlive                On
    MaxKeepAliveRequests     500
    KeepAliveTimeout         5
</IfModule>
