# Laravel Email Server — Apache 2.4 + PHP-FPM (production)
# DocumentRoot: /var/www/email_server/backend/public

<VirtualHost *:80>
    ServerName email-server.local
    DocumentRoot /var/www/email_server/backend/public

    <Directory /var/www/email_server/backend/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # Block sensitive files (enterprise hardening)
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
    <Files ".env">
        Require all denied
    </Files>
    <Files "composer.json">
        Require all denied
    </Files>
    <Files "composer.lock">
        Require all denied
    </Files>

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-XSS-Protection "1; mode=block"

    # PHP 8.4 FPM
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost"
    </FilesMatch>

  ErrorLog ${APACHE_LOG_DIR}/email-server-error.log
  CustomLog ${APACHE_LOG_DIR}/email-server-access.log combined
</VirtualHost>
