# notifications.africacdc.org — host Nginx reverse proxy + Certbot SSL
#
# Docker stack (this repo):
#   API / admin API upstream : 127.0.0.1:8089
#   Admin UI upstream        : 127.0.0.1:3006
#
# Install (HTTP first, then Certbot SSL):
#   sudo cp deploy/configs/nginx-notifications.africacdc.org.conf \
#     /etc/nginx/sites-available/notifications.africacdc.org.conf
#   sudo ln -sf /etc/nginx/sites-available/notifications.africacdc.org.conf \
#     /etc/nginx/sites-enabled/notifications.africacdc.org.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Certbot is already installed on the servers):
#   sudo certbot --nginx -d notifications.africacdc.org --agree-tos --redirect \
#     -m andrewa@africacdc.org --non-interactive
#
# Certificate paths after success:
#   /etc/letsencrypt/live/notifications.africacdc.org/fullchain.pem
#   /etc/letsencrypt/live/notifications.africacdc.org/privkey.pem

upstream email_server_api {
    server 127.0.0.1:8089;
    keepalive 32;
}

upstream email_server_ui {
    server 127.0.0.1:3006;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name notifications.africacdc.org;

    # Certbot (--nginx --redirect) will:
    #   1) add a matching listen 443 ssl server { ... }
    #   2) rewrite this port-80 server to redirect to HTTPS
    # Certificate files live under /etc/letsencrypt/live/notifications.africacdc.org/

    client_max_body_size 20M;

    # ACME HTTP-01 challenge (required before/during certbot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    # Laravel API (and branding, health, docs when non-prod)
    location /api/ {
        proxy_pass http://email_server_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health without requiring the /api/v1 path knowledge
    location = /up {
        proxy_pass http://email_server_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin SPA (Vue) — proxied UI also forwards /api/ to the API container
    location / {
        proxy_pass http://email_server_ui;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 60s;
    }
}
