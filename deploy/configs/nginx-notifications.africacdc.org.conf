# notifications.africacdc.org — host Nginx reverse proxy + Certbot SSL
#
# Docker stack (this repo):
#   API / admin API upstream : 127.0.0.1:8089
#   Admin UI upstream        : 127.0.0.1:3006
#
# Install (HTTP first, then Certbot SSL):
#   sudo cp deploy/configs/nginx-security-headers.conf \
#     /etc/nginx/snippets/email-server-security-headers.conf
#   sudo cp deploy/configs/nginx-notifications.africacdc.org.conf \
#     /etc/nginx/sites-available/notifications.africacdc.org.conf
#   sudo ln -sf /etc/nginx/sites-available/notifications.africacdc.org.conf \
#     /etc/nginx/sites-enabled/notifications.africacdc.org.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Certbot is already installed on the servers):
#   sudo certbot --nginx -d notifications.africacdc.org --agree-tos --redirect \
#     -m andrewa@africacdc.org --non-interactive
#
# Certificate paths after success:
#   /etc/letsencrypt/live/notifications.africacdc.org/fullchain.pem
#   /etc/letsencrypt/live/notifications.africacdc.org/privkey.pem

upstream email_server_api {
    server 127.0.0.1:8089;
    keepalive 32;
}

upstream email_server_ui {
    server 127.0.0.1:3006;
    keepalive 32;
}

# Map only known good methods (blocks TRACE/TRACK and odd verbs)
map $request_method $email_server_method_ok {
    default 0;
    GET     1;
    HEAD    1;
    POST    1;
    PUT     1;
    PATCH   1;
    DELETE  1;
    OPTIONS 1;
}

server {
    listen 80;
    listen [::]:80;
    server_name notifications.africacdc.org;

    # Certbot (--nginx --redirect) will:
    #   1) add a matching listen 443 ssl server { ... }
    #   2) rewrite this port-80 server to redirect to HTTPS
    # Certificate files live under /etc/letsencrypt/live/notifications.africacdc.org/

    client_max_body_size 20M;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    client_body_timeout 30s;
    client_header_timeout 30s;

    include /etc/nginx/snippets/email-server-security-headers.conf;

    # ACME HTTP-01 challenge (required before/during certbot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    # Reject non-standard HTTP methods early
    if ($email_server_method_ok = 0) {
        return 405;
    }

    # Laravel API
    location /api/ {
        # Anti-spoofing: ignore client-supplied forwarded headers; trust only
        # the connection peer ($remote_addr) and this server's $scheme/$host.
        proxy_pass http://email_server_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        # Explicitly clear any client spoof attempts that proxies might forward
        proxy_set_header X-Original-URL "";
        proxy_set_header X-Rewrite-URL "";
        proxy_hide_header X-Powered-By;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Branding uploads + public storage (must NOT go to the Vue SPA)
    location /storage/ {
        proxy_pass http://email_server_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_hide_header X-Powered-By;
        proxy_read_timeout 60s;
    }

    # Health without requiring the /api/v1 path knowledge
    location = /up {
        proxy_pass http://email_server_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    # Block probing of sensitive paths (even though the SPA would 404 them)
    location ~* /(^|/)\.(env|git|svn|htaccess|htpasswd|DS_Store) {
        return 404;
    }
    location ~* \.(php|phtml|phar|asp|aspx|cgi|pl)$ {
        return 404;
    }

    # Admin SPA (Vue) — proxied UI also forwards /api/ to the API container
    location / {
        proxy_pass http://email_server_ui;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_hide_header X-Powered-By;
        proxy_read_timeout 60s;
    }
}
